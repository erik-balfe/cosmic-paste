name: CI

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            pkg-config \
            libwayland-dev \
            wl-clipboard

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  build-release:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            pkg-config \
            libwayland-dev \
            wl-clipboard

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93
      - uses: Swatinem/rust-cache@v2

      - name: Build release bundle
        run: |
          cargo build --release -p cosmic-paste-daemon -p cosmic-paste-cli -p cosmic-paste-applet
          chmod +x scripts/build-release-bundle.sh
          ./scripts/build-release-bundle.sh
          ls -la target/*.tar.gz*

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/cosmic-paste-*-linux-x86_64.tar.gz
            target/cosmic-paste-*-linux-x86_64.tar.gz.sha256