name: CI

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            pkg-config \
            libwayland-dev

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  build-release:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            pkg-config \
            libwayland-dev

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93
      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: |
          cargo build --release -p cosmic-paste-daemon -p cosmic-paste-cli -p cosmic-paste-applet
          mkdir -p dist
          cp target/release/cosmic-paste-daemon dist/
          cp target/release/cosmic-paste dist/
          cp target/release/cosmic-paste-applet dist/
          cp scripts/cosmic-paste-show-history dist/
          chmod +x dist/*
          tar czf cosmic-paste-linux-x86_64.tar.gz -C dist .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: cosmic-paste-linux-x86_64.tar.gz